# ============================================================
# Redis Configuration - macOS Homebrew
# Location: /opt/homebrew/etc/redis.conf
# ============================================================

# ── Network ─────────────────────────────────────────────────
bind 127.0.0.1
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── Authentication ──────────────────────────────────────────
requirepass Password09

# ACL user (Redis 6+)
# aclfile /opt/homebrew/etc/redis.acl
# user redis on >Password09 ~* &* +@all

# ── General ─────────────────────────────────────────────────
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile /opt/homebrew/var/log/redis.log
databases 16

# ── Snapshotting (RDB) ──────────────────────────────────────
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /opt/homebrew/var/db/redis/

# ── Append Only File (AOF) ──────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ── Memory Management ───────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ── Lazy Freeing ────────────────────────────────────────────
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# ── Slow Log ────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Latency Monitoring ──────────────────────────────────────
latency-monitor-threshold 0
